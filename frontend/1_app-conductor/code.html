<script>

        document.querySelector('.group').addEventListener('click', function() {
            const originalColor = this.style.backgroundColor;
            this.classList.add('ring-4', 'ring-secondary-container');
            setTimeout(() => {
                this.classList.remove('ring-4', 'ring-secondary-container');
